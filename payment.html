<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Complete Payment</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px}
.card{max-width:520px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
h2{text-align:center}
.row{margin:16px 0}
.label{color:#666;font-size:13px}
.value{font-weight:bold;font-size:18px;margin-top:4px}
button{width:100%;padding:12px;border:none;border-radius:8px;margin-top:8px;cursor:pointer}
.primary{background:#0b57d0;color:#fff}
.success{background:#198754;color:#fff}
img{display:block;margin:20px auto;width:220px;max-width:100%}
</style>
</head>
<body>
<div class="card">
<h2>Complete Your Donation</h2>

<div class="row"><div class="label">Reference</div><div class="value" id="ref"></div></div>
<div class="row"><div class="label">Amount</div><div class="value" id="amount"></div></div>
<div class="row"><div class="label">Campaign</div><div class="value" id="campaign"></div></div>

<button class="primary" id="upiBtn">Open UPI App</button>

<img id="qr">

<div class="row">
<div class="label">Mobile</div>
<div class="value">8099813634</div>
<button onclick="copyText('8099813634')">Copy Mobile Number</button>
</div>

<div class="row">
<div class="label">UPI ID</div>
<div class="value">makbarali.005@oksbi</div>
<button onclick="copyText('makbarali.005@oksbi')">Copy UPI ID</button>
</div>

<button class="success" id="doneBtn">I Have Completed Payment</button>
</div>

<script type="module">
import {db,doc,updateDoc} from "./firebase.js";

const q=new URLSearchParams(location.search);
const id=q.get("id");
const ref=q.get("ref");
const amount=q.get("amount");
const campaign=q.get("campaign");

document.getElementById("ref").textContent=ref;
document.getElementById("amount").textContent="₹ "+amount;
document.getElementById("campaign").textContent=campaign;

const upi=`upi://pay?pa=makbarali.005@oksbi&pn=Anjuman&am=${amount}&cu=INR&tn=${campaign}|Ref:${ref}`;

document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+encodeURIComponent(upi);

document.getElementById("upiBtn").onclick=()=>{location.href=upi;};

window.copyText=async(t)=>{
 await navigator.clipboard.writeText(t);
 alert("Copied");
};

document.getElementById("doneBtn").onclick=async()=>{
 try{
   await updateDoc(doc(db,"donations",id),{
     status:"Payment Submitted"
   });
   alert("Thank you! Payment marked as submitted.");
   location.href="index.html";
 }catch(e){
   console.error(e);
   alert("Unable to update payment status.");
 }
};
</script>
</body>
</html>
