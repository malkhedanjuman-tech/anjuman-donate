<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donation Admin Pro</title>
<style>
<body>

<div class="app">

    <!-- ================= HEADER ================= -->

    <header class="topbar">

        <div class="logo">

            <h2>Donation Admin</h2>

            <small>Enterprise Dashboard</small>

        </div>

        <div class="top-actions">

            <button id="refreshBtn">
                🔄 Refresh
            </button>

            <button id="exportCSV">
                CSV
            </button>

            <button id="exportExcel">
                Excel
            </button>

            <button id="printBtn">
                Print
            </button>

        </div>

    </header>



    <!-- ================= KPI ================= -->

    <section class="cards">

        <div class="card">
            <span>Total Donations</span>
            <h2 id="totalDonations">0</h2>
        </div>

        <div class="card">
            <span>Total Amount</span>
            <h2 id="totalAmount">₹0</h2>
        </div>

        <div class="card">
            <span>Pending</span>
            <h2 id="pendingCount">0</h2>
        </div>

        <div class="card">
            <span>Verified</span>
            <h2 id="verifiedCount">0</h2>
        </div>

        <div class="card">
            <span>Initiated</span>
            <h2 id="initiatedCount">0</h2>
        </div>

        <div class="card">
            <span>Payment Submitted</span>
            <h2 id="submittedCount">0</h2>
        </div>

        <div class="card">
            <span>Today's Collection</span>
            <h2 id="todayCollection">₹0</h2>
        </div>

        <div class="card">
            <span>This Month</span>
            <h2 id="monthCollection">₹0</h2>
        </div>

    </section>



    <!-- ================= FILTERS ================= -->

    <section class="filters">

        <input
            id="searchBox"
            placeholder="Search Name / Mobile / Ref ID">

        <input
            id="campaignFilter"
            placeholder="Campaign">

        <select id="statusFilter">

            <option value="">All Status</option>

            <option>Initiated</option>

            <option>Payment Submitted</option>

            <option>Verified</option>

        </select>

        <input type="date" id="fromDate">

        <input type="date" id="toDate">

        <label>

            <input
                type="checkbox"
                id="todayOnly">

            Today's Donations

        </label>

        <label>

            <input
                type="checkbox"
                id="pendingOnly">

            Pending Only

        </label>

    </section>



    <!-- ================= BULK ACTIONS ================= -->

    <section class="bulkbar">

        <button id="verifySelected">

            Verify Selected

        </button>

        <button id="changeCampaign">

            Change Campaign

        </button>

        <button id="changeStatus">

            Change Status

        </button>

        <button id="exportSelected">

            Export Selected

        </button>

        <button id="deleteSelected">

            Delete Selected

        </button>

    </section>



    <!-- ================= TABLE ================= -->

    <section class="table-container">

        <table id="donationTable">

            <thead>

            <tr>

                <th>

                    <input
                        type="checkbox"
                        id="selectAll">

                </th>

                <th>#</th>

                <th>Reference</th>

                <th>Name</th>

                <th>Mobile</th>

                <th>Amount</th>

                <th>Campaign</th>

                <th>Status</th>

                <th>Date</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </section>



    <!-- ================= PAGINATION ================= -->

    <section class="pagination">

        <button id="prevPage">

            Previous

        </button>

        <span id="pageNumber">

            1

        </span>

        <button id="nextPage">

            Next

        </button>

        <select id="rowsPerPage">

            <option>25</option>

            <option>50</option>

            <option>100</option>

        </select>

    </section>



    <!-- ================= DRAWER ================= -->

    <aside id="drawer">

        <div class="drawer-header">

            <h3>

                Donation Details

            </h3>

            <button id="closeDrawer">

                ✕

            </button>

        </div>

        <div id="drawerContent">

        </div>

    </aside>



    <!-- ================= LOADER ================= -->

    <div id="loading">

        Loading...

    </div>



    <!-- ================= TOAST ================= -->

    <div id="toast">

    </div>



</div>

<script type="module" src="admin.js"></script>

</body></html>
